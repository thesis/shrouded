[advisories]
yanked = "warn"

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause",
    "ISC", "Zlib", "Unicode-3.0", "CC0-1.0",
]

[bans]
multiple-versions = "warn"
deny = [{ crate = "openssl-sys" }]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
